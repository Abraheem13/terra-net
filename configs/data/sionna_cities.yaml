# Sionna RT generation targets.
# 12 morphologically diverse cities with usable OSM building-height coverage.
# Each scene is a square of `size_m` centred on (lat, lon) -> TRUE geo-reference,
# so OSM descriptors and ray-traced path loss describe the same ground.
dataset: sionna
size_m: 3000            # 3 x 3 km per city -> 900 tiles at 100 m, 225 at 200 m
freq_ghz: 3.5
bs_per_city: 20
bs_height_agl: 6.0      # antenna mast above the host rooftop
ue_height_agl: 1.5
cell_size_m: 5.0        # radio-map raster resolution
max_points_per_bs: 50000
sionna_version_pin: ">=0.19"   # code adapts to 0.19 (coverage_map) and 1.x (RadioMapSolver)

cities:
  # name:        [lat, lon]            morphology note
  amsterdam:     [52.3676, 4.9041]     # low-rise dense, canals (water descriptors)
  rotterdam:     [51.9244, 4.4777]     # modern high-rise + port
  berlin:        [52.5200, 13.4050]    # mid-rise uniform blocks
  hamburg:       [53.5511, 9.9937]     # mixed, waterways
  munich:        [48.1351, 11.5820]    # mid-rise, height-capped centre
  london:        [51.5074, -0.1278]    # mixed heights, river
  paris:         [48.8566, 2.3522]     # very uniform Haussmann canyons
  prague:        [50.0755, 14.4378]    # hilly terrain, historic core
  vienna:        [48.2082, 16.3738]    # mid-rise, parks
  barcelona:     [41.3851, 2.1734]     # grid plan, uniform blocks
  newyork:       [40.7580, -73.9855]   # extreme high-rise canyons
  chicago:       [41.8781, -87.6298]   # high-rise + open lakefront
