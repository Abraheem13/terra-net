model:
  desc_dim: 116
  emb_dim: 256
  use_descriptor: true
  use_raster: true
  da: dann            # none | dann | coral | mmd
  w_da: 0.1
  w_phys: 0.1
  target_scale: [1.0, 20.0]   # gamma ~ O(1), PL0 ~ O(20 dB): balance the NLL
optim:
  lr: 3.0e-4
  weight_decay: 0.01
  max_epochs: 200
  batch_size: 128
  precision: bf16-mixed
uq:
  conformal_alpha: 0.1
  ensemble_size: 5
